scene:
  name: "Spheres"

  camera:
    position: [0.0, 1.5, 5.0]
    target:   [0.0, 0.0, 0.0]
    fov: 45.0

  materials:
    - name: red
      albedo:   [0.85, 0.15, 0.15]

    - name: green
      albedo:   [0.15, 0.80, 0.25]

    - name: blue
      albedo:   [0.20, 0.40, 0.90]

    - name: ground
      albedo:   [0.55, 0.55, 0.55]

    - name: light
      albedo:   [0.0, 0.0, 0.0]
      emission: [12.0, 11.0, 9.0]  # warm light

  objects:
    - type: sphere
      center: [-1.2, 0.0,  0.0]
      radius: 0.5
      material: red

    - type: sphere
      center: [ 0.0, 0.0,  0.0]
      radius: 0.5
      material: green

    - type: sphere
      center: [ 1.2, 0.0,  0.0]
      radius: 0.5
      material: blue

    - type: sphere   # ground plane (large)
      center: [ 0.0, -100.5, 0.0]
      radius: 100.0
      material: ground

    - type: sphere   # area light overhead
      center: [ 0.0,  8.0, 0.0]
      radius: 2.0
      material: light
