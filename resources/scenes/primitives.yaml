scene:
  name: "SDF Primitives"
  camera:
    position: [0, 3, 9]
    target:   [0, 0.8, 0]
    fov: 50.0
  materials:
    - name: light
      albedo:   [1.0, 1.0, 1.0]
      emission: [12.0, 10.0, 8.0]
    - name: floor
      albedo:   [0.75, 0.75, 0.75]
    - name: red_metal
      albedo:   [0.9, 0.2, 0.1]
      metallic: 1.0
      roughness: 0.2
    - name: green
      albedo:   [0.2, 0.85, 0.3]
    - name: blue_metal
      albedo:   [0.15, 0.35, 0.9]
      metallic: 1.0
      roughness: 0.35
    - name: orange
      albedo:   [1.0, 0.5, 0.1]
    - name: purple_metal
      albedo:   [0.6, 0.1, 0.85]
      metallic: 0.8
      roughness: 0.2
    - name: gold
      albedo:   [1.0, 0.78, 0.15]
      metallic: 1.0
      roughness: 0.1
  objects:
    # Area light
    - type: sphere
      center: [0, 8, 2]
      radius: 1.5
      material: light
    # Floor — infinite plane replaces the big-sphere trick
    - type: plane
      normal: [0, 1, 0]
      offset: 0.0
      material: floor
    # Sphere (raymarched) — x=-4.5
    - type: sphere
      center: [-4.5, 0.5, 0]
      radius: 0.5
      material: red_metal
      raymarch: true
    # Capsule — x=-2.8  (a.y = radius so it sits on floor)
    - type: capsule
      a: [-2.8, 0.25, 0]
      b: [-2.8, 1.3, 0]
      radius: 0.25
      material: green
    # Cylinder — x=-1.1
    - type: cylinder
      center: [-1.1, 0.7, 0]
      axis:   [0, 1, 0]
      radius: 0.3
      half_height: 0.7
      material: blue_metal
    # Box — x=0.5
    - type: box
      center: [0.5, 0.5, 0]
      half_extents: [0.42, 0.5, 0.42]
      material: orange
    # Rounded box — x=2.2
    - type: rounded_box
      center: [2.2, 0.5, 0]
      half_extents: [0.42, 0.5, 0.42]
      corner_radius: 0.12
      material: purple_metal
    # Torus — x=3.8
    - type: torus
      center: [3.8, 0.3, 0]
      major_radius: 0.55
      minor_radius: 0.28
      axis: [0, 1, 0]
      material: gold
