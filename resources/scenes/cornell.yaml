scene:
  name: "Cornell Box (spheres)"

  camera:
    position: [0.0, 0.0, 3.5]
    target:   [0.0, 0.0, 0.0]
    fov: 40.0

  materials:
    - name: white
      albedo: [0.73, 0.73, 0.73]

    - name: red
      albedo: [0.65, 0.05, 0.05]

    - name: green
      albedo: [0.12, 0.45, 0.15]

    - name: light
      albedo:   [0.0, 0.0, 0.0]
      emission: [15.0, 15.0, 15.0]

    - name: gold
      albedo: [0.85, 0.65, 0.10]

    - name: blue
      albedo: [0.15, 0.30, 0.80]

  objects:
    # Left wall (red)
    - type: sphere
      center: [-101.0, 0.0, 0.0]
      radius: 100.0
      material: red

    # Right wall (green)
    - type: sphere
      center: [101.0, 0.0, 0.0]
      radius: 100.0
      material: green

    # Floor
    - type: sphere
      center: [0.0, -101.0, 0.0]
      radius: 100.0
      material: white

    # Ceiling
    - type: sphere
      center: [0.0, 101.0, 0.0]
      radius: 100.0
      material: white

    # Back wall
    - type: sphere
      center: [0.0, 0.0, -101.0]
      radius: 100.0
      material: white

    # Area light (inside the box, flush with ceiling at y=1)
    - type: sphere
      center: [0.0, 0.85, 0.0]
      radius: 0.2
      material: light

    # Left sphere
    - type: sphere
      center: [-0.5, -0.5, 0.2]
      radius: 0.5
      material: gold

    # Right sphere
    - type: sphere
      center: [0.5, -0.5, -0.3]
      radius: 0.5
      material: blue
