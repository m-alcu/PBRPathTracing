scene:
  name: "Sponza Atrium"

  # Classic Crytek/McGuire Sponza: atrium runs along X (~-13 to +13),
  # open roof at Y ≈ 11.  Camera looks down the long hall axis.
  camera:
    position: [-10.0, 1.8,  0.0]
    target:   [ 10.0, 1.8,  0.0]
    fov: 60.0

  # Materials come from the accompanying sponza.mtl via use_obj_materials.
  # No explicit materials needed here.

  objects:
    - type: obj
      file: "resources/objs/sponza/sponza.obj"
      use_obj_materials: true
