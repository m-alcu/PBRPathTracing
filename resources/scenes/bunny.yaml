scene:
  name: "Bunny"

  camera:
    position: [0.0, 0.15, 0.40]
    target:   [0.0, 0.10, 0.0]
    fov: 45.0

  materials:
    - name: blue
      albedo:   [0.4, 0.75, 0.85]

    - name: ground
      albedo:        [0.1, 0.1, 0.1]
      checker:       true
      checker_scale: 2.0
      checker_color2: [0.9, 0.9, 0.9]

  objects:
    - type: obj
      file: "resources/objs/bunny.obj"
      material: blue

    - type: sphere   # ground plane
      center: [0.0, -100.0, 0.0]
      radius: 100.0
      material: ground
