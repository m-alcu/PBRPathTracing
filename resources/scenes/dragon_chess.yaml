scene:
  name: "Glass Dragon Chess"

  camera:
    position: [1.1, 0.9, 0.0]
    target:   [0.0, 0.0, 0.0]
    fov: 50.0

  materials:
    - name: chess_floor
      albedo:   [0.95, 0.64, 0.54]
      roughness: 0.8
      checker:  true

    - name: glass
      albedo:   [1.0, 1.0, 1.0]
      transmission: 1.0
      ior: 1.5

    - name: light
      emission: [22.0, 20.0, 16.0]

    - name: light_warm
      emission: [18.0, 10.0, 4.0]

    - name: light_cool
      emission: [4.0, 10.0, 22.0]

  objects:
    # Glass dragon (sits at y ≈ -0.283 .. +0.28)
    - type: obj
      file: "resources/objs/dragon.obj"
      material: glass

    # Chessboard floor
    - type: plane
      normal: [0, 1, 0]
      offset: -0.283
      material: chess_floor

    # Overhead key light
    - type: sphere
      center: [0.0, 5.5, 1.5]
      radius: 1.8
      material: light

    # Warm fill (left)
    - type: sphere
      center: [-3.0, 3.0, 1.0]
      radius: 0.8
      material: light_warm

    # Cool fill (right)
    - type: sphere
      center: [3.0, 3.0, 1.0]
      radius: 0.8
      material: light_cool
